android {
    namespace "io.github.some_example_name.android"
    compileSdk 34
    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            java.srcDirs = ['src/main/java']
            aidl.srcDirs = ['src/main/java']
            renderscript.srcDirs = ['src/main/java']
            res.srcDirs = ['res']
            assets.srcDirs = ['../assets']
            jniLibs.srcDirs = ['libs']
        }
    }
    packagingOptions {
        resources {
            excludes += ['META-INF/robovm/ios/robovm.xml', 'META-INF/DEPENDENCIES', 'META-INF/LICENSE', 'META-INF/LICENSE.txt', 'META-INF/license.txt', 'META-INF/NOTICE', 'META-INF/NOTICE.txt', 'META-INF/notice.txt', 'META-INF/ASL2.0', 'META-INF/gradle/incremental.annotation.processors']
        }
    }
    defaultConfig {
        applicationId "io.github.some_example_name.android"
        minSdk 19
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation project(":core")
    api "com.badlogicgames.gdx:gdx-backend-android:$gdxVersion"
    api "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-armeabi-v7a"
    api "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-arm64-v8a"
    api "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-x86"
    api "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-x86_64"
}
